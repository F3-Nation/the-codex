# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: DATABASE_URL
    secret: codex-database-url
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXTAUTH_SECRET
    secret: codex-nextauth-secret
    availability:
      - BUILD
      - RUNTIME
  - variable: AUTH_PROVIDER_URL
    secret: codex-auth-provider-url
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXTAUTH_URL
    secret: codex-nextauth-url
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_NEXTAUTH_URL
    secret: codex-next-public-nextauth-url
    availability:
      - BUILD
      - RUNTIME
  - variable: OAUTH_REDIRECT_URI
    secret: codex-oauth-redirect-uri
    availability:
      - BUILD
      - RUNTIME
  - variable: OAUTH_CLIENT_ID
    secret: codex-oauth-client-id
    availability:
      - BUILD
      - RUNTIME
  - variable: OAUTH_CLIENT_SECRET
    secret: codex-oauth-client-secret
    availability:
      - BUILD
      - RUNTIME
  - variable: SENDGRID_API_KEY
    secret: codex-sendgrid-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: FROM_EMAIL
    secret: codex-from-email
    availability:
      - BUILD
      - RUNTIME

  # Cloud SQL Auth Proxy (Unix socket) connection.
  # Set INSTANCE_UNIX_SOCKET to enable; set DB_USE_UNIX_SOCKET=false to force DATABASE_URL fallback.
  - variable: INSTANCE_UNIX_SOCKET
    secret: codex-instance-unix-socket
    availability:
      - RUNTIME
  - variable: DB_USER
    secret: codex-db-user
    availability:
      - RUNTIME
  - variable: DB_PASSWORD
    secret: client-database-password
    availability:
      - RUNTIME
  - variable: DB_NAME
    secret: codex-db-name
    availability:
      - RUNTIME
